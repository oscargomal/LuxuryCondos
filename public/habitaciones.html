<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Departamentos | Luxury Condo</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="header">
  <div class="container nav">

 <h1 class="logo">Luxury Condo</h1>

    <!-- BOTÓN HAMBURGUESA -->
    <input type="checkbox" id="menu-toggle">
    <label for="menu-toggle" class="menu-icon">☰</label>

    <!-- MENÚ -->
    <nav class="menu">
      <a href="/">Inicio</a>
      <a href="galeria.html">Galería</a>
      <a href="habitaciones.html">Reservar</a>
      <a href="servicios.html">Servicios</a>
      <a href="ubicacion.html">Ubicación</a>
      <a href="contacto.html">Contacto</a>
      <a href="/eng/habitaciones.html">English</a>
    </nav>

  </div>
</header>
<!-- ================= HERO ================= -->
<section class="hero hero-small">
  <div class="hero-content">
    <h2>Departamentos</h2>
    <p>Espacios diseñados para tu descanso</p>
  </div>
</section>

<!-- ================= ROOMS ================= -->
<section class="container rooms" data-rooms-list></section>

<!-- ================= MODAL ================= -->
<div class="room-modal" id="roomModal">
  <div class="modal-content">

    <span class="modal-close" id="closeModal">&times;</span>

    <!-- IMAGEN -->
    <div class="modal-gallery">
      <button class="modal-gallery-nav prev" id="modalPrevBtn" type="button" aria-label="Imagen anterior">‹</button>
      <img id="modalMainImg" src="" alt="Departamento">
      <button class="modal-gallery-nav next" id="modalNextBtn" type="button" aria-label="Imagen siguiente">›</button>
    </div>
    <div class="modal-thumbs-wrap" id="modalThumbsWrap" hidden>
      <div class="modal-thumbs-header">
        <span>Vista previa</span>
        <button class="modal-thumbs-more" id="modalThumbsMore" type="button" hidden>Ver más</button>
      </div>
      <div class="modal-thumbs" id="modalThumbs"></div>
    </div>

    <!-- INFO -->
    <div class="modal-info">
      <h3 id="modalTitle"></h3>
      <p class="modal-desc modal-desc--full" id="modalDescription"></p>

      <div class="modal-footer">
        <span class="modal-price" id="modalPrice"></span>

        <!-- 🔥 BOTÓN CORRECTO -->
<a href="reservar.html"
   class="btn reservar-btn"
   id="modalReservar">
  Reservar
</a>

      </div>
    </div>

  </div>
</div>

<!-- ================= FOOTER ================= -->
<footer class="footer"><p class="mb-1">© 2025 Condominios/Hoteles Ajijic, Jalisco</p>
      <small>Contacto: <a href="mailto:luxurycondo@hotmail.com" class="text-white text-decoration-underline">luxurycondo@gmail.com</a> • Tel: +52 33 1369 5589</small>
</footer>

<!-- ================= JS ================= -->

<script src="assets/js/rooms.js"></script>
<script src="/assets/js/main.js"></script>

</body>
</html>
