<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Apartments | Luxury Condo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

<header class="header">
  <div class="container nav">

 <h1 class="logo">Luxury Condo</h1>

    <!-- HAMBURGER BUTTON -->
    <input type="checkbox" id="menu-toggle">
    <label for="menu-toggle" class="menu-icon">☰</label>

    <!-- MENU -->
    <nav class="menu">
      <a href="/eng/">Home</a>
      <a href="/eng/galeria.html">Gallery</a>
      <a href="/eng/habitaciones.html">Apartments</a>
      <a href="/eng/servicios.html">Services</a>
      <a href="/eng/ubicacion.html">Location</a>
      <a href="/eng/contacto.html">Contact</a>
      <a href="/habitaciones.html">Español</a>
    </nav>

  </div>
</header>
<!-- ================= HERO ================= -->
<section class="hero hero-small">
  <div class="hero-content">
    <h2>Apartments</h2>
    <p>Spaces designed for your rest</p>
  </div>
</section>

<!-- ================= ROOMS ================= -->
<section class="container rooms" data-rooms-list></section>

<!-- ================= MODAL ================= -->
<div class="room-modal" id="roomModal">
  <div class="modal-content">

    <span class="modal-close" id="closeModal">&times;</span>

    <!-- IMAGEN -->
    <div class="modal-gallery">
      <button class="modal-gallery-nav prev" id="modalPrevBtn" type="button" aria-label="Previous image">‹</button>
      <img id="modalMainImg" src="" alt="Apartment">
      <button class="modal-gallery-nav next" id="modalNextBtn" type="button" aria-label="Next image">›</button>
    </div>
    <div class="modal-thumbs-wrap" id="modalThumbsWrap" hidden>
      <div class="modal-thumbs-header">
        <span>Preview</span>
        <button class="modal-thumbs-more" id="modalThumbsMore" type="button" hidden>Load more</button>
      </div>
      <div class="modal-thumbs" id="modalThumbs"></div>
    </div>

    <!-- INFO -->
    <div class="modal-info">
      <h3 id="modalTitle"></h3>
      <p class="modal-desc modal-desc--full" id="modalDescription"></p>

      <div class="modal-footer">
        <span class="modal-price" id="modalPrice"></span>

        <!-- 🔥 BOTÓN CORRECTO -->
<a href="/eng/reservar.html"
   class="btn reservar-btn"
   id="modalReservar">
  Book
</a>

      </div>
    </div>

  </div>
</div>

<!-- ================= FOOTER ================= -->
<footer class="footer"><p class="mb-1">© 2025 Condos/Hotels Ajijic, Jalisco</p>
      <small>Contact: <a href="mailto:luxurycondo@hotmail.com" class="text-white text-decoration-underline">luxurycondo@gmail.com</a> • Phone: +52 33 1369 5589</small>
</footer>

<!-- ================= JS ================= -->
<script src="/assets/js/habi.js"></script>
<script src="/assets/js/rooms.js"></script>

</body>
</html>
