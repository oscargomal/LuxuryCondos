<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clientes | Luxury Condo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/clientes.css">
  <link rel="stylesheet" href="css/admin.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

  <aside class="sidebar">
    <h2>Luxury Condo</h2>
    <nav>
      <a href="admin.html" class="active">Dashboard</a>
      <a href="reservaciones.html">Reservaciones</a>
      <a href="rooms.html">Departamentos</a>
      <a href="avisos.html">Avisos</a>
      <a href="clientes.html">Clientes</a>

      <a href="index.html" class="logout" data-logout>Cerrar sesión</a>
    </nav>
  </aside>

  <main class="main">

    <header class="header">
      <h1>Clientes</h1>
    </header>

    <section class="table-section">
      <h2>Clientes registrados</h2>

      <table>
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Correo</th>
            <th>Teléfono</th>
            <th>Reservaciones</th>
            <th>Acciones</th>
          </tr>
        </thead>

        <tbody id="clientTableBody">
          <tr>
            <td colspan="5">No hay clientes registrados.</td>
          </tr>
        </tbody>
      </table>
    </section>

  </main>

  <div class="modal-overlay" id="clientModal">
    <div class="modal">
      <button class="modal-close" type="button" data-modal-close>×</button>
      <h3>Detalle del cliente</h3>
      <div class="modal-grid" id="clientModalInfo"></div>
      <div class="modal-actions" id="clientModalIdActions"></div>
      <ul class="modal-list" id="clientModalReservations"></ul>
    </div>
  </div>
  <div class="admin-toast" id="clientToast" role="status" aria-live="polite"></div>
  <div class="admin-confirm" id="clientConfirm" hidden>
    <p id="clientConfirmMessage">¿Confirmar acción?</p>
    <div class="admin-confirm__actions">
      <button class="btn btn-danger btn-small" type="button" id="clientConfirmYes">Eliminar</button>
      <button class="btn btn-light btn-small" type="button" id="clientConfirmNo">Cancelar</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "luxuryReservations";
    const tableBody = document.getElementById("clientTableBody");
    const modal = document.getElementById("clientModal");
    const modalInfo = document.getElementById("clientModalInfo");
    const modalReservations = document.getElementById("clientModalReservations");
    const modalIdActions = document.getElementById("clientModalIdActions");
    const modalClose = document.querySelector("[data-modal-close]");
    const clientToast = document.getElementById("clientToast");
    const clientConfirm = document.getElementById("clientConfirm");
    const clientConfirmMessage = document.getElementById("clientConfirmMessage");
    const clientConfirmYes = document.getElementById("clientConfirmYes");
    const clientConfirmNo = document.getElementById("clientConfirmNo");

    let reservationsCache = [];
    let reservationsSourceCache = [];
    let clientsCache = [];
    let clientToastTimer = null;
    let confirmResolver = null;

    const readReservations = () => {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return [];
      try {
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        return [];
      }
    };

    const normalizeReservation = (reservation) => {
      if (reservation?.guest) {
        return {
          ...reservation,
          stayType: reservation?.stayType || reservation?.stay_type,
          paymentStatus: reservation?.paymentStatus || reservation?.payment_status
        };
      }

      const guestSnapshot = reservation?.guest_snapshot || {};
      return {
        id: reservation?.id,
        guest: {
          name: reservation?.guest_name || guestSnapshot?.name || "—",
          email: reservation?.guest_email || guestSnapshot?.email || "—",
          phone: reservation?.guest_phone || guestSnapshot?.phone || "—",
          idPhotoFront: guestSnapshot?.idPhotoFront || null,
          idPhotoBack: guestSnapshot?.idPhotoBack || null
        },
        stayType: reservation?.stay_type,
        checkin: reservation?.checkin,
        checkout: reservation?.checkout,
        status: reservation?.status,
        paymentStatus: reservation?.payment_status
      };
    };

    const getClientKey = (guest, reservationId = "") => {
      const email = String(guest?.email || "").trim();
      const phone = String(guest?.phone || "").trim();
      const name = String(guest?.name || "").trim();
      return email || phone || name || String(reservationId || "");
    };

    const showClientToast = (message, variant = "success") => {
      if (!clientToast) return;
      clientToast.textContent = message;
      clientToast.classList.remove("show", "is-error");
      if (variant === "error") clientToast.classList.add("is-error");
      clientToast.classList.add("show");
      clearTimeout(clientToastTimer);
      clientToastTimer = setTimeout(() => {
        clientToast.classList.remove("show");
      }, 2800);
    };

    const askClientConfirm = (message) => new Promise((resolve) => {
      if (!clientConfirm || !clientConfirmMessage || !clientConfirmYes || !clientConfirmNo) {
        resolve(confirm(message));
        return;
      }
      clientConfirmMessage.textContent = message;
      clientConfirm.hidden = false;
      confirmResolver = resolve;
    });

    const closeClientConfirm = (value) => {
      if (!clientConfirm) return;
      clientConfirm.hidden = true;
      if (confirmResolver) {
        confirmResolver(value);
        confirmResolver = null;
      }
    };

    if (clientConfirmYes) {
      clientConfirmYes.addEventListener("click", () => closeClientConfirm(true));
    }
    if (clientConfirmNo) {
      clientConfirmNo.addEventListener("click", () => closeClientConfirm(false));
    }

    const formatStayType = (value) => {
      if (!value) return "—";
      const normalized = String(value).toLowerCase();
      if (normalized === "night") return "Por noche";
      if (normalized === "month") return "Mensual";
      if (normalized === "year") return "Anual";
      if (normalized === "other") return "Otro";
      return value;
    };

    const getPaymentMethodLabel = (reservation) => {
      const stayType = String(reservation?.stayType || "").toLowerCase();
      if (stayType === "other") return "No aplica";
      const status = String(reservation?.status || "").toLowerCase();
      if (status.includes("transfer")) return "Transferencia";
      return "Tarjeta";
    };

    const buildClientMap = (reservationsRaw) => {
      reservationsSourceCache = Array.isArray(reservationsRaw) ? reservationsRaw : [];
      const reservations = reservationsSourceCache.map((reservation, index) => ({
        ...normalizeReservation(reservation),
        _sourceIndex: index
      }));
      reservationsCache = reservations;
      const clientMap = new Map();

      reservations.forEach((reservation) => {
        const guest = reservation?.guest || {};
        const key = getClientKey(guest, reservation?.id);
        if (!key) return;

        if (!clientMap.has(key)) {
          clientMap.set(key, {
            key,
            name: guest.name || "—",
            email: guest.email || "—",
            phone: guest.phone || "—",
            idPhotoFront: guest.idPhotoFront || null,
            idPhotoBack: guest.idPhotoBack || null,
            count: 0,
            reservations: []
          });
        } else {
          const current = clientMap.get(key);
          if (!current.idPhotoFront && guest.idPhotoFront) current.idPhotoFront = guest.idPhotoFront;
          if (!current.idPhotoBack && guest.idPhotoBack) current.idPhotoBack = guest.idPhotoBack;
        }

        clientMap.get(key).count += 1;
        clientMap.get(key).reservations.push(reservation);
      });

      clientsCache = Array.from(clientMap.values());
      return clientsCache;
    };

    const renderClients = (clients) => {
      if (!tableBody) return;
      tableBody.innerHTML = "";

      if (!clients.length) {
        tableBody.innerHTML = "<tr><td colspan=\"5\">No hay clientes registrados.</td></tr>";
        return;
      }

      clients.forEach((client) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${client.name}</td>
          <td>${client.email}</td>
          <td>${client.phone}</td>
          <td>${client.count}</td>
          <td>
            <button class="btn btn-info btn-small" data-action="view" data-key="${client.key}">Ver</button>
            <button class="btn btn-primary btn-small" data-action="edit" data-key="${client.key}">Editar</button>
            <button class="btn btn-danger btn-small" data-action="delete" data-key="${client.key}">Eliminar</button>
          </td>
        `;
        tableBody.appendChild(row);
      });
    };

    const applyGuestToRaw = (rawReservation, guest) => {
      if (!rawReservation || typeof rawReservation !== "object") return;

      if (rawReservation.guest && typeof rawReservation.guest === "object") {
        rawReservation.guest = {
          ...rawReservation.guest,
          name: guest.name,
          email: guest.email,
          phone: guest.phone
        };
      }

      if (rawReservation.guest_snapshot && typeof rawReservation.guest_snapshot === "object") {
        rawReservation.guest_snapshot = {
          ...rawReservation.guest_snapshot,
          name: guest.name,
          email: guest.email,
          phone: guest.phone
        };
      }

      rawReservation.guest_name = guest.name;
      rawReservation.guest_email = guest.email;
      rawReservation.guest_phone = guest.phone;
    };

    const persistReservations = () => {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(reservationsSourceCache));
    };

    const fetchSignedUrl = async (path) => {
      const response = await fetch("/api/signed-url", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ bucket: "customer-ids", path })
      });
      const result = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(result?.error || "No se pudo generar el enlace.");
      }
      return result?.signedUrl || "";
    };

    const openClientModal = async (client) => {
      if (!modal || !modalInfo || !modalReservations) return;
      modalInfo.innerHTML = `
        <p><span>Nombre</span>${client.name}</p>
        <p><span>Correo</span>${client.email}</p>
        <p><span>Teléfono</span>${client.phone}</p>
      `;

      modalIdActions.innerHTML = "";
      if (client.idPhotoFront) {
        const btn = document.createElement("button");
        btn.className = "btn btn-info btn-small";
        btn.textContent = "Ver ID frente";
        btn.addEventListener("click", async () => {
          try {
            const url = await fetchSignedUrl(client.idPhotoFront);
            if (url) window.open(url, "_blank", "noopener");
          } catch (error) {
            alert(error.message || "Error obteniendo el ID.");
          }
        });
        modalIdActions.appendChild(btn);
      }

      if (client.idPhotoBack) {
        const btn = document.createElement("button");
        btn.className = "btn btn-info btn-small";
        btn.textContent = "Ver ID reverso";
        btn.addEventListener("click", async () => {
          try {
            const url = await fetchSignedUrl(client.idPhotoBack);
            if (url) window.open(url, "_blank", "noopener");
          } catch (error) {
            alert(error.message || "Error obteniendo el ID.");
          }
        });
        modalIdActions.appendChild(btn);
      }

      if (!client.idPhotoFront && !client.idPhotoBack) {
        const empty = document.createElement("span");
        empty.textContent = "Sin ID registrado.";
        modalIdActions.appendChild(empty);
      }

      modalReservations.innerHTML = "";
      const reservations = client.reservations || [];
      if (!reservations.length) {
        modalReservations.innerHTML = "<li>Sin reservaciones registradas.</li>";
      } else {
        reservations.forEach((reservation) => {
          const stayTypeLabel = formatStayType(reservation.stayType);
          const paymentMethod = getPaymentMethodLabel(reservation);
          const checkin = reservation.checkin || "—";
          const checkout = reservation.checkout || "—";
          const status = reservation.status || "—";
          const item = document.createElement("li");
          item.textContent = `#${reservation.id} · ${stayTypeLabel} · ${checkin} → ${checkout} · ${paymentMethod} · ${status}`;
          modalReservations.appendChild(item);
        });
      }

      modal.classList.add("active");
    };

    const findClientByKey = (key) => clientsCache.find((item) => item.key === key);

    const editClient = (client) => {
      if (!client) return;
      const nextName = prompt("Nombre del cliente:", client.name || "");
      if (nextName === null) return;
      const nextEmail = prompt("Correo del cliente:", client.email || "");
      if (nextEmail === null) return;
      const nextPhone = prompt("Teléfono del cliente:", client.phone || "");
      if (nextPhone === null) return;

      const guest = {
        name: nextName.trim() || "—",
        email: nextEmail.trim() || "—",
        phone: nextPhone.trim() || "—"
      };

      const currentKey = client.key;
      reservationsCache.forEach((reservation) => {
        const guestData = reservation?.guest || {};
        const key = getClientKey(guestData, reservation?.id);
        if (key !== currentKey) return;

        reservation.guest = { ...guestData, ...guest };
        const sourceIndex = reservation._sourceIndex;
        if (Number.isInteger(sourceIndex)) {
          applyGuestToRaw(reservationsSourceCache[sourceIndex], guest);
        }
      });

      persistReservations();
      renderClients(buildClientMap(reservationsSourceCache));
      showClientToast("Cliente actualizado.");
      if (modal?.classList.contains("active")) {
        const updated = findClientByKey(getClientKey(guest));
        if (updated) openClientModal(updated);
      }
    };

    const deleteClient = async (client) => {
      if (!client) return;
      const shouldDelete = await askClientConfirm(`¿Eliminar cliente "${client.name}" y sus reservaciones?`);
      if (!shouldDelete) return;

      const sourceIndexes = new Set();
      const reservationIds = [];

      reservationsCache.forEach((reservation) => {
        const guestData = reservation?.guest || {};
        const key = getClientKey(guestData, reservation?.id);
        if (key !== client.key) return;
        if (Number.isInteger(reservation._sourceIndex)) sourceIndexes.add(reservation._sourceIndex);
        if (reservation?.id) reservationIds.push(reservation.id);
      });

      let remoteErrors = 0;
      for (const id of reservationIds) {
        try {
          await fetch("/api/reservations", {
            method: "DELETE",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id })
          });
        } catch (error) {
          remoteErrors += 1;
        }
      }

      reservationsSourceCache = reservationsSourceCache.filter((_, index) => !sourceIndexes.has(index));
      persistReservations();
      renderClients(buildClientMap(reservationsSourceCache));
      if (modal) modal.classList.remove("active");

      if (remoteErrors) {
        showClientToast("Cliente eliminado localmente. Algunas reservaciones no se pudieron borrar en servidor.", "error");
      } else {
        showClientToast("Cliente eliminado correctamente.");
      }
    };

    tableBody.addEventListener("click", async (event) => {
      const button = event.target.closest("[data-action]");
      if (!button) return;
      const action = button.dataset.action;
      const key = button.dataset.key;
      const client = findClientByKey(key);
      if (!client) return;

      if (action === "view") {
        await openClientModal(client);
        return;
      }

      if (action === "edit") {
        editClient(client);
        return;
      }

      if (action === "delete") {
        await deleteClient(client);
      }
    });

    if (modalClose && modal) {
      modalClose.addEventListener("click", () => modal.classList.remove("active"));
      modal.addEventListener("click", (event) => {
        if (event.target === modal) modal.classList.remove("active");
      });
    }

    const fetchReservations = async () => {
      try {
        const response = await fetch("/api/reservations");
        if (!response.ok) return null;
        const result = await response.json();
        return result?.data || null;
      } catch (error) {
        return null;
      }
    };

    const loadClients = async () => {
      const apiReservations = await fetchReservations();
      if (apiReservations) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(apiReservations));
        renderClients(buildClientMap(apiReservations));
        return;
      }
      renderClients(buildClientMap(readReservations()));
    };

    loadClients();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/admin/js/auth.js"></script>
</body>
</html>
